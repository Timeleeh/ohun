<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>케미사주 — 썸네일 (1932×828)</title>
<style>
  body{margin:0;background:#202329;color:#e8eaed;font-family:-apple-system,"Malgun Gothic",sans-serif;
    display:flex;flex-direction:column;align-items:center;gap:18px;padding:28px}
  h1{font-size:16px;font-weight:700;margin:0;color:#aab2c0}
  .frame{box-shadow:0 10px 40px rgba(0,0,0,.5);border-radius:10px;overflow:hidden;max-width:100%}
  .frame svg{width:966px;max-width:100%;height:auto;display:block}  /* 미리보기 50%, 실제 1932×828 */
  button{background:#c6ff3d;color:#0d0e12;border:none;border-radius:12px;padding:13px 22px;
    font-size:15px;font-weight:800;cursor:pointer}
  .hint{font-size:12.5px;color:#8d93a1;text-align:center;line-height:1.6;max-width:520px}
</style>
</head>
<body>
<h1>케미사주 · 썸네일 (1932×828 PNG)</h1>
<div class="frame">
<svg id="thumb" xmlns="http://www.w3.org/2000/svg" width="1932" height="828" viewBox="0 0 1932 828">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15181e"/><stop offset="1" stop-color="#0a0b0f"/>
    </linearGradient>
    <radialGradient id="rg" cx="78%" cy="50%" r="42%">
      <stop offset="0" stop-color="rgba(198,255,61,.12)"/><stop offset="1" stop-color="rgba(198,255,61,0)"/>
    </radialGradient>
    <linearGradient id="link" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c6ff3d"/><stop offset="1" stop-color="#ff7a8a"/>
    </linearGradient>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1932" height="828" fill="url(#bg)"/>
  <rect width="1932" height="828" fill="url(#rg)"/>

  <!-- 좌측: 브랜드 + 부제 + 칩 -->
  <text x="150" y="360" font-family="'Malgun Gothic',sans-serif" font-weight="900" font-size="184" letter-spacing="-6">
    <tspan fill="#c6ff3d">케미</tspan><tspan fill="#ffffff">사주</tspan>
  </text>
  <text x="158" y="452" font-family="'Malgun Gothic',sans-serif" font-weight="700" font-size="58" fill="#c9ced6">
    친구들과 보는 우리 그룹 케미 운세
  </text>
  <!-- 칩 3개 -->
  <g font-family="'Malgun Gothic',sans-serif" font-weight="800" font-size="34">
    <rect x="158" y="520" width="232" height="74" rx="37" fill="rgba(198,255,61,.12)"/>
    <text x="274" y="568" text-anchor="middle" fill="#c6ff3d">매일 한 번</text>
    <rect x="410" y="520" width="262" height="74" rx="37" fill="rgba(84,160,255,.14)"/>
    <text x="541" y="568" text-anchor="middle" fill="#7cc0ff">단톡방 공유</text>
    <rect x="692" y="520" width="232" height="74" rx="37" fill="rgba(255,122,138,.14)"/>
    <text x="808" y="568" text-anchor="middle" fill="#ff9aa6">최대 6명</text>
  </g>
  <text x="158" y="700" font-family="'Malgun Gothic',sans-serif" font-weight="700" font-size="38" fill="#6b7280">
    오늘 누구랑 케미 터질까? · 토스에서 만나요
  </text>

  <!-- 우측: 미니 인연 다이어그램 (중심 1480,414, r160) -->
  <g filter="url(#g)" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M 1480 254 Q 1600 330 1640 414" stroke="#34e3a0"/>
    <path d="M 1640 414 Q 1560 540 1480 574" stroke="#ff7a8a" stroke-dasharray="3 9"/>
    <path d="M 1480 574 Q 1360 500 1320 414" stroke="#34e3a0"/>
    <path d="M 1320 414 Q 1400 300 1480 254" stroke="#ffd43b"/>
    <path d="M 1480 254 Q 1480 414 1480 574" stroke="#54a0ff"/>
  </g>
  <g font-family="'Malgun Gothic',sans-serif" font-weight="900" font-size="34" text-anchor="middle">
    <circle cx="1480" cy="254" r="50" fill="#34e3a0" stroke="#0a0b0f" stroke-width="6"/><text x="1480" y="266" fill="#0a0b0f">지훈</text>
    <circle cx="1640" cy="414" r="50" fill="#ff7a8a" stroke="#0a0b0f" stroke-width="6"/><text x="1640" y="426" fill="#0a0b0f">민준</text>
    <circle cx="1480" cy="574" r="50" fill="#aab2c0" stroke="#0a0b0f" stroke-width="6"/><text x="1480" y="586" fill="#0a0b0f">서연</text>
    <circle cx="1320" cy="414" r="50" fill="#54a0ff" stroke="#0a0b0f" stroke-width="6"/><text x="1320" y="426" fill="#0a0b0f">하늘</text>
  </g>
  <text x="1480" y="690" text-anchor="middle" font-family="'Malgun Gothic',sans-serif" font-weight="800" font-size="34" fill="#c6ff3d">💘 오늘의 운명 인연</text>
</svg>
</div>
<button onclick="dl()">⬇ PNG 다운로드 (1932×828)</button>
<div class="hint">버튼으로 정확한 1932×828 PNG가 저장돼요. (토스 썸네일 규격)<br>잘 안 받아지면 위 이미지를 캡쳐해도 됩니다.</div>

<script>
function dl(){
  const svg=document.getElementById("thumb");
  const xml=new XMLSerializer().serializeToString(svg);
  const url="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(xml)));
  const img=new Image();
  img.onload=function(){
    const c=document.createElement("canvas"); c.width=1932; c.height=828;
    c.getContext("2d").drawImage(img,0,0,1932,828);
    const a=document.createElement("a"); a.download="chemisaju-thumbnail-1932x828.png";
    a.href=c.toDataURL("image/png"); a.click();
  };
  img.src=url;
}
</script>
</body>
</html>
