<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0d0e12" />
<title>케미사주 — 오늘의 그룹 운세</title>
<style>
  :root{
    --bg:#0d0e12; --card:#181a20; --surf2:#23262e; --ink:#f4f5f7; --sub:#8d93a1;
    --acc:#c6ff3d; --blue:#c6ff3d; --good:#34e3a0; --caution:#ff7a8a; --line:#2a2e38;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",
    "Malgun Gothic",sans-serif; background:var(--bg); color:var(--ink);
    max-width:480px; margin:0 auto; padding-bottom:100px}
  header{padding:26px 20px 12px}
  .date{font-size:13px; color:var(--sub); font-weight:700; letter-spacing:.3px; text-transform:uppercase}
  .theme{margin-top:7px; font-size:27px; font-weight:900; letter-spacing:-.8px}
  .theme .el{color:var(--acc)}
  .summary{margin:14px 20px 0; background:var(--card); border-radius:20px; padding:17px 18px;
    font-size:15px; line-height:1.5; font-weight:600; border:1px solid var(--line)}
  .summary .tag{display:inline-block; font-size:11px; color:var(--acc); font-weight:800;
    background:rgba(198,255,61,.12); padding:4px 10px; border-radius:999px; margin-bottom:9px; letter-spacing:.2px}
  h2{font-size:12px; color:var(--sub); font-weight:800; margin:28px 20px 11px; letter-spacing:.4px; text-transform:uppercase}
  /* 인연 다이어그램 */
  .diagram{background:var(--card); margin:0 20px; border-radius:24px; padding:8px; border:1px solid var(--line)}
  svg{width:100%; height:auto; display:block; touch-action:manipulation}
  .legend{display:flex; gap:16px; justify-content:center; padding:6px 0 12px; font-size:12px; color:var(--sub); font-weight:600}
  .legend i{display:inline-block; width:18px; height:3px; border-radius:2px; vertical-align:middle; margin-right:5px}
  .legend .g{background:var(--good)} .legend .c{background:var(--caution)}
  .hint{text-align:center; font-size:11.5px; color:var(--sub); padding-bottom:10px}
  svg{overflow:visible}
  .edge{fill:none; stroke-width:3.2; stroke-linecap:round; cursor:pointer; filter:url(#glow);
    stroke-dasharray:9 7; animation:flow 1.6s linear infinite;
    transition:opacity .25s, stroke-width .2s}
  .edge.good{stroke:var(--good)}
  .edge.caution{stroke:var(--caution)}
  .edge.fate{stroke:#ffd43b; stroke-width:4; animation-duration:1.05s}
  .edge.hot{stroke-width:6}
  @keyframes flow{to{stroke-dashoffset:-32}}
  @media (prefers-reduced-motion:reduce){ .edge,.badge{animation:none} }
  .badge{cursor:pointer; transform-box:fill-box; transform-origin:center; animation:bob 2.4s ease-in-out infinite}
  .badge circle{fill:var(--card); stroke-width:1.5}
  .badge.good circle{stroke:var(--good)} .badge.caution circle{stroke:var(--caution)}
  .badge.fate circle{stroke:#ffd43b}
  .badge text{font-size:13px; text-anchor:middle; dominant-baseline:central}
  .badge.pop{animation:pop .42s ease}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.55)}100%{transform:scale(1)}}
  .reveal{margin:2px 10px 12px; min-height:20px; text-align:center; font-size:13px; font-weight:700;
    line-height:1.55; color:var(--ink); padding:11px 14px; border-radius:14px; background:var(--surf2);
    border:1px solid var(--line)}
  .reveal .who{color:var(--acc); font-weight:800}
  .reveal.good{border-color:rgba(52,227,160,.45)}
  .reveal.caution{border-color:rgba(255,122,138,.45)}
  .reveal.fate{border-color:#ffd43b}
  .node circle{transition:r .2s, stroke-width .2s}
  .node text{font-size:13px; font-weight:900; fill:#0d0e12; text-anchor:middle; dominant-baseline:central}
  .node .el{font-size:10px; font-weight:800}
  .dim{opacity:.14}
  /* 멤버 카드 */
  .card{background:var(--card); margin:10px 20px 0; border-radius:20px; padding:16px 18px;
    border:1px solid var(--line); scroll-margin-top:12px; transition:border-color .2s, box-shadow .2s, transform .2s}
  .card.active{border-color:var(--acc); box-shadow:0 0 0 1px var(--acc), 0 0 24px rgba(198,255,61,.18)}
  .crow{display:flex; align-items:center; gap:10px}
  .dot{width:36px; height:36px; border-radius:50%; display:grid; place-items:center;
    color:#0d0e12; font-weight:900; font-size:14px; flex:none}
  .name{font-size:16px; font-weight:900}
  .base{font-size:11.5px; color:var(--sub); font-weight:600; margin-top:2px}
  .score{margin-left:auto; font-size:13px; font-weight:800; color:var(--acc)}
  .line{margin-top:11px; font-size:14.5px; line-height:1.5; font-weight:600}
  .chem{margin-top:11px; display:flex; flex-direction:column; gap:6px}
  .chip{font-size:12.5px; line-height:1.45; padding:9px 12px; border-radius:13px; font-weight:600}
  .chip.good{background:rgba(52,227,160,.12); color:#6ff0bd}
  .chip.caution{background:rgba(255,122,138,.12); color:#ffa7b2}
  /* 상단 앱바 */
  .appbar{display:flex; align-items:center; gap:8px}
  .gname{font-size:18px; font-weight:900; letter-spacing:-.4px}
  .gswitch{font-size:12px; font-weight:800; color:var(--acc); background:rgba(198,255,61,.12); border:none;
    padding:7px 11px; border-radius:999px; cursor:pointer}
  .me{margin-left:auto; width:36px; height:36px; border-radius:50%; background:var(--surf2); border:1px solid var(--line);
    font-size:16px; cursor:pointer}
  /* 하단 액션 바 */
  .actionbar{position:fixed; left:50%; transform:translateX(-50%); bottom:14px;
    width:min(456px,calc(100% - 28px)); display:flex; gap:10px; z-index:20}
  .btn{flex:1; border:none; border-radius:16px; padding:17px 10px; font-size:15.5px; font-weight:900; cursor:pointer}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:var(--acc); color:#0d0e12; box-shadow:0 8px 26px rgba(198,255,61,.28)}
  .btn.invite{flex:0 0 42%; background:var(--surf2); color:var(--ink); border:1px solid var(--line)}
  /* 바텀시트 */
  .scrim{position:fixed; inset:0; background:rgba(0,0,0,.6); opacity:0; pointer-events:none;
    transition:opacity .25s; z-index:30}
  .scrim.show{opacity:1; pointer-events:auto}
  .sheet{position:fixed; left:50%; transform:translateX(-50%) translateY(110%); bottom:0;
    width:min(480px,100%); background:var(--card); border-radius:24px 24px 0 0; border-top:1px solid var(--line);
    padding:20px 20px calc(22px + env(safe-area-inset-bottom));
    transition:transform .3s cubic-bezier(.2,.8,.2,1); z-index:31}
  .sheet.show{transform:translateX(-50%) translateY(0)}
  .grip{width:40px; height:4px; background:#3a3e48; border-radius:2px; margin:0 auto 16px}
  .sheet h3{margin:0 0 4px; font-size:19px; font-weight:900}
  .sheet p{margin:0 0 16px; font-size:13.5px; color:var(--sub); font-weight:600; line-height:1.5}
  .linkbox{display:flex; gap:8px; background:var(--surf2); border-radius:13px; padding:6px 6px 6px 14px; align-items:center}
  .linkbox input{flex:1; border:none; background:transparent; font-size:13px; color:var(--ink); font-weight:600; outline:none}
  .linkbox button{border:none; background:var(--acc); color:#0d0e12; font-weight:900; border-radius:10px; padding:10px 14px; font-size:13px; cursor:pointer}
  .sheet .kakao{margin-top:12px; width:100%; border:none; border-radius:15px; padding:16px;
    font-size:15.5px; font-weight:900; background:#fee500; color:#191600; cursor:pointer}
  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:88px; background:var(--ink);
    color:#0d0e12; padding:12px 18px; border-radius:13px; font-size:13.5px; font-weight:800;
    opacity:0; transition:opacity .25s; pointer-events:none}
  .toast.show{opacity:.97}
  footer{text-align:center; font-size:11px; color:var(--sub); padding:22px 20px 0}
  [hidden]{display:none !important}
  /* 그룹 만들기 화면 */
  #create{padding:0 0 40px}
  .topnav{display:flex; align-items:center; gap:6px; padding:20px 16px 8px; font-size:18px; font-weight:900}
  .back{border:none; background:none; font-size:30px; line-height:1; color:var(--ink); cursor:pointer; padding:0 6px 0 0}
  .form{padding:8px 20px}
  .fl{display:block; font-size:12px; font-weight:800; color:var(--sub); margin:20px 0 8px; letter-spacing:.3px; text-transform:uppercase}
  .fi{width:100%; border:1px solid var(--line); background:var(--card); border-radius:15px; padding:16px;
    font-size:16px; font-weight:600; color:var(--ink); outline:none}
  .fi:focus{border-color:var(--acc); box-shadow:0 0 0 1px var(--acc)}
  .fhint{font-size:12.5px; color:var(--sub); font-weight:600; line-height:1.55; margin:11px 2px 0}
  .fhint b{color:var(--acc); font-weight:800}
  .cap{margin:20px 0 6px; background:rgba(198,255,61,.1); color:var(--acc); font-weight:800; font-size:13px;
    text-align:center; padding:12px; border-radius:13px}
  .btn.full{width:100%; margin-top:18px; box-shadow:0 8px 26px rgba(198,255,61,.28)}
  .newgroup{background:var(--surf2) !important; color:var(--ink) !important}
  .glist .gitem{display:flex; align-items:center; gap:10px; padding:15px 4px; border-bottom:1px solid var(--line);
    font-size:15px; font-weight:800; cursor:pointer}
  .glist .gitem:last-child{border-bottom:none}
  .glist .gitem .mini{font-size:12px; color:var(--sub); font-weight:600; margin-left:auto}
</style>
</head>
<body>
<div id="home">
<header>
  <div class="appbar">
    <span class="gname" id="gname">우리팀 단톡방</span>
    <button class="gswitch" onclick="openGroups()">그룹 전환 ▾</button>
    <button class="me" onclick="toastMsg('내 정보 수정은 그룹 탈퇴 후 재가입으로 가능해요')" aria-label="내 정보">🙂</button>
  </div>
  <div class="date" id="date" style="margin-top:14px"></div>
  <div class="theme">오늘의 기운 · <span class="el" id="dayEl">木</span></div>
</header>

<div class="summary"><span class="tag">오늘의 그룹 한줄평</span><div id="groupComment"></div></div>

<h2>🔮 인연 다이어그램 — 인연선·동그라미를 탭해보세요</h2>
<div class="diagram">
  <svg id="svg" viewBox="0 0 320 300" aria-label="인연 다이어그램"></svg>
  <div class="legend"><span><i class="g"></i>좋은 인연</span><span><i class="c"></i>주의 인연</span><span>💘 오늘의 운명</span></div>
  <div class="reveal" id="reveal">동그라미나 인연선을 탭해보세요 ✨</div>
</div>

<h2>멤버별 오늘의 운세</h2>
<div id="cards"></div>

<div class="actionbar">
  <button class="btn invite" onclick="openInvite()">🔗 지인 초대</button>
  <button class="btn primary" onclick="share()">💬 카톡 공유</button>
</div>
</div><!-- /#home -->

<!-- 그룹 만들기 화면 (FR-02) -->
<section id="create" hidden>
  <div class="topnav"><button class="back" onclick="showHome()" aria-label="뒤로">‹</button>
    <span>새 그룹 만들기</span></div>
  <div class="form">
    <label class="fl" for="gn">그룹 이름</label>
    <input id="gn" class="fi" placeholder="예) 우리팀 단톡방" maxlength="20" />
    <label class="fl" for="gt">매일 운세 받을 시간</label>
    <input id="gt" class="fi" type="time" value="08:00" />
    <p class="fhint">지정한 시각에 <b>하루 한 번</b> 그룹 운세가 생성돼요. 실시간 생성이 아니라
      자원을 아끼고, 단톡방에 아침 인사처럼 딱 맞춰 공유할 수 있어요.</p>
    <div class="cap">👥 한 그룹은 최대 6명까지 함께할 수 있어요</div>
    <button class="btn primary full" onclick="createGroup()">그룹 만들고 친구 초대하기</button>
  </div>
</section>

<!-- 그룹 목록/선택 시트 -->
<aside class="sheet" id="gsheet" role="dialog" aria-label="그룹 선택">
  <div class="grip"></div>
  <h3>내 그룹</h3>
  <div id="glist"></div>
  <button class="kakao newgroup" onclick="goCreate()">＋ 새 그룹 만들기</button>
</aside>

<div class="scrim" id="scrim" onclick="closeSheets()"></div>
<aside class="sheet" id="sheet" role="dialog" aria-label="지인 초대하기">
  <div class="grip"></div>
  <h3>지인 초대하기</h3>
  <p>이 링크로 들어온 친구는 생년월일만 입력하면 바로 이 그룹에 합류해요. (최대 6명)</p>
  <div class="linkbox">
    <input id="invlink" readonly value="" />
    <button onclick="copyLink()">복사</button>
  </div>
  <button class="kakao" onclick="shareInvite()">카카오톡으로 초대하기</button>
</aside>

<div class="toast" id="toast"></div>
<footer>케미사주</footer>

<script>
// ===== 설정: 실제 API 연결 (미설정 시 샘플 데이터로 동작) =====
// 사용법: ?api=<백엔드주소>&group=<group_id>[&user=<user_id>]
//   또는 localStorage 에 chemisaju_api / chemisaju_group / chemisaju_user 저장
const QS = new URLSearchParams(location.search);
const cfg = k => QS.get(k) || localStorage.getItem("chemisaju_" + k) || "";
const API = (cfg("api") || "https://chemisaju-api.onrender.com").replace(/\/+$/, "");
let GROUP_ID = cfg("group");
let USER_ID  = cfg("user");
let KAKAO_KEY = cfg("kakao");   // 카카오 JS 키(?kakao= / localStorage / API의 /share/config)
const LIVE = !!(API && GROUP_ID);

const PALETTE = {목:"#34e3a0", 화:"#ff7a8a", 토:"#ffc24b", 금:"#aab2c0", 수:"#54a0ff"};

// 샘플 데이터(오프라인/목업 폴백) — 실제 서비스는 배치 생성 결과를 API로 주입
const SAMPLE = {
  date:"2026년 6월 19일 (금)",
  dayElement:"木",
  groupComment:"다들 추진력은 넘치는데 방향이 제각각인 날, 회의는 짧게.",
  members:[
    {id:"jihoon", name:"지훈", el:"목", base:"木 기운 강함 (비화로 추진력↑)", score:4,
     line:"지훈님, 오늘 머릿속 아이디어 일단 적어만 두세요"},
    {id:"minjun", name:"민준", el:"화", base:"火 기운 과열 (목생화로 달아오름)", score:3,
     line:"민준님, 열정 과다 주의보. 커피는 한 잔만."},
    {id:"seoyeon", name:"서연", el:"금", base:"金 기운 강함 (금극목으로 충돌 가능)", score:5,
     line:"서연님 직감 적중률 오늘 역대급, 믿고 가세요"},
    {id:"haneul", name:"하늘", el:"수", base:"水 기운 충만 (수생목으로 흐름 좋음)", score:4,
     line:"하늘님, 오늘은 한 발 물러서면 다 풀리는 날"},
    {id:"doyun", name:"도윤", el:"토", base:"土 기운 안정 (목극토로 살짝 눌림)", score:3,
     line:"도윤님, 무리한 약속 NO. 페이스 지키면 무난"},
  ],
  chemistry:[
    {a:"jihoon", b:"minjun", type:"good", line:"지훈님 아이디어에 민준님 추진력 붙으면 오늘 일 하나 끝남"},
    {a:"jihoon", b:"seoyeon", type:"caution", line:"지훈님 vs 서연님, 오늘 의견 다르면 일단 서연님 말부터"},
    {a:"jihoon", b:"haneul", type:"good", line:"지훈님 들뜰 때 하늘님이 차분히 잡아주면 완벽"},
    {a:"minjun", b:"haneul", type:"caution", line:"민준님 열정에 하늘님 찬물, 오늘은 서로 톤 조절"},
    {a:"seoyeon", b:"doyun", type:"good", fate:true, line:"서연님 판단에 도윤님 실행력, 오늘 합 최고"},
    {a:"haneul", b:"doyun", type:"caution", line:"하늘님과 도윤님, 결정 미루다 둘 다 지칠 수 있어요"},
  ],
};

// ===== 상태 / DOM =====
const NS="http://www.w3.org/2000/svg";
const svg = document.getElementById("svg");
const reveal = document.getElementById("reveal");
const EL_HANJA={목:"木",화:"火",토:"土",금:"金",수:"水"};
const GOOD_EMO=["💚","✨","🍀","🤝"], CAUT_EMO=["⚡","🔥","🌶️","💥"];
let DATA, nameById = {}, pos = {}, activeId = null;

// ===== API =====
async function apiGet(path){
  const r = await fetch(API + path, {headers:{accept:"application/json"}});
  if(!r.ok) throw new Error(path + " → " + r.status);
  return r.json();
}
async function apiPost(path, body){
  const r = await fetch(API + path, {method:"POST",
    headers:{"content-type":"application/json", accept:"application/json"},
    body: JSON.stringify(body)});
  if(!r.ok) throw new Error(path + " → " + r.status);
  return r.json();
}
// 백엔드 /view 응답 → 화면 DATA 형태로 변환
function adapt(v){
  return {
    date: v.date_label,
    dayElement: v.day_element,
    groupComment: v.group_comment,
    groupName: v.group_name,
    members: v.members.map(m=>({id:m.id, name:m.name, el:m.element, base:m.base, score:m.score, line:m.line})),
    chemistry: v.chemistry.map(c=>({a:c.a, b:c.b, type:c.type, fate:c.fate, line:c.line})),
  };
}

// ===== 렌더링 =====
function render(data){
  DATA = data;
  nameById = Object.fromEntries(DATA.members.map(m=>[m.id, m.name]));
  activeId = null;
  document.getElementById("date").textContent = DATA.date;
  document.getElementById("dayEl").textContent = DATA.dayElement;
  document.getElementById("groupComment").textContent = DATA.groupComment;
  if(DATA.groupName) document.getElementById("gname").textContent = DATA.groupName;
  renderCards();
  renderDiagram();
  setReveal("동그라미나 인연선을 탭해보세요 ✨", "");
}

// 멤버 카드
function renderCards(){
  const cards = document.getElementById("cards");
  cards.innerHTML = "";
  DATA.members.forEach(m=>{
    const rel = DATA.chemistry.filter(c=>c.a===m.id||c.b===m.id);
    const chips = rel.map(c=>{
      const other = nameById[c.a===m.id?c.b:c.a];
      return `<div class="chip ${c.type}">${c.type==="good"?"💚":"⚠️"} ${c.line}</div>`;
    }).join("");
    const stars = "★".repeat(m.score)+"☆".repeat(5-m.score);
    cards.insertAdjacentHTML("beforeend", `
      <div class="card" id="card-${m.id}">
        <div class="crow">
          <div class="dot" style="background:${PALETTE[m.el]}">${m.name[0]}</div>
          <div><div class="name">${m.name}</div><div class="base">${m.base}</div></div>
          <div class="score">${stars}</div>
        </div>
        <div class="line">${m.line}</div>
        <div class="chem">${chips}</div>
      </div>`);
  });
}

// 인연 다이어그램 (원형 배치)
function renderDiagram(){
  svg.innerHTML = "";
  pos = {};
  const cx=160, cy=148, R=98;
  DATA.members.forEach((m,i)=>{
    const ang = -Math.PI/2 + i*2*Math.PI/DATA.members.length;
    pos[m.id] = {x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang), el:m.el, name:m.name};
  });

  // defs: 네온 글로우 + 중앙 광채
  svg.insertAdjacentHTML("beforeend", `<defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bgglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(198,255,61,.10)"/>
      <stop offset="100%" stop-color="rgba(198,255,61,0)"/>
    </radialGradient>
  </defs>
  <circle cx="${cx}" cy="${cy}" r="118" fill="url(#bgglow)"></circle>`);

  // 엣지(바깥으로 볼록한 곡선) + 케미 이모지 뱃지
  let gi=0, ci=0;
  DATA.chemistry.forEach((c,idx)=>{
    const p=pos[c.a], q=pos[c.b];
    if(!p || !q) return;  // 페어 멤버가 현재 그룹에 없으면 스킵(방어)
    const mx=(p.x+q.x)/2, my=(p.y+q.y)/2;
    const ctrlx=cx+(mx-cx)*1.32, ctrly=cy+(my-cy)*1.32;
    const bx=0.25*p.x+0.5*ctrlx+0.25*q.x, by=0.25*p.y+0.5*ctrly+0.25*q.y; // 곡선 중점(t=0.5)
    const cls = c.fate ? "fate" : c.type;
    const emo = c.fate ? "💘" : (c.type==="good" ? GOOD_EMO[gi++%GOOD_EMO.length] : CAUT_EMO[ci++%CAUT_EMO.length]);

    const path=document.createElementNS(NS,"path");
    path.setAttribute("d",`M ${p.x} ${p.y} Q ${ctrlx} ${ctrly} ${q.x} ${q.y}`);
    path.setAttribute("class",`edge ${cls}`);
    path.dataset.a=c.a; path.dataset.b=c.b; path.dataset.idx=idx;
    path.addEventListener("click",e=>{ e.stopPropagation(); showChem(idx); });
    svg.appendChild(path);

    const badge=document.createElementNS(NS,"g");
    badge.setAttribute("class",`badge ${cls}`);
    badge.dataset.a=c.a; badge.dataset.b=c.b; badge.dataset.idx=idx;
    badge.style.animationDelay=(idx*0.18)+"s";
    badge.innerHTML=`<circle cx="${bx}" cy="${by}" r="13"></circle><text x="${bx}" y="${by}">${emo}</text>`;
    badge.addEventListener("click",e=>{ e.stopPropagation(); showChem(idx); });
    svg.appendChild(badge);
  });

  // 노드
  DATA.members.forEach(m=>{
    const p=pos[m.id];
    const g=document.createElementNS(NS,"g");
    g.setAttribute("class","node"); g.dataset.id=m.id;
    g.style.cursor="pointer";
    g.innerHTML=`<circle cx="${p.x}" cy="${p.y}" r="22" fill="${PALETTE[m.el]}"
        stroke="#0d0e12" stroke-width="3"></circle>
      <text x="${p.x}" y="${p.y-3}">${m.name}</text>
      <text class="el" x="${p.x}" y="${p.y+10}">${EL_HANJA[m.el]}</text>`;
    g.addEventListener("click",()=>toggle(m.id));
    svg.appendChild(g);
  });
}

const allEdges=()=>[...svg.querySelectorAll(".edge")];
const allBadges=()=>[...svg.querySelectorAll(".badge")];
const allNodes=()=>[...svg.querySelectorAll(".node")];
function setReveal(html, cls){ reveal.className="reveal"+(cls?" "+cls:""); reveal.innerHTML=html; }

// 케미선/뱃지 탭 → 그 인연만 강조 + 코멘트 공개 (재미 포인트)
function showChem(idx){
  const c=DATA.chemistry[idx];
  activeId=null;
  allNodes().forEach(n=>n.classList.remove("dim"));
  document.querySelectorAll(".card").forEach(x=>x.classList.remove("active"));
  allEdges().forEach(e=>{ const on=+e.dataset.idx===idx;
    e.classList.toggle("hot",on); e.classList.toggle("dim",!on); });
  allBadges().forEach(b=>{ const on=+b.dataset.idx===idx;
    b.classList.toggle("dim",!on);
    if(on){ b.classList.remove("pop"); void b.getBBox();
      b.classList.add("pop"); b.addEventListener("animationend",()=>b.classList.remove("pop"),{once:true}); }
  });
  const tag=c.fate?"💘 오늘의 운명 인연":(c.type==="good"?"💚 좋은 인연":"⚡ 주의 인연");
  setReveal(`<span class="who">${tag}</span><br>${c.line}`, c.fate?"fate":c.type);
}

function toggle(id){
  activeId = (activeId===id)?null:id;
  if(activeId===null){
    allEdges().forEach(e=>e.classList.remove("dim","hot"));
    allBadges().forEach(b=>b.classList.remove("dim"));
    allNodes().forEach(n=>n.classList.remove("dim"));
    document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
    setReveal("동그라미나 인연선을 탭해보세요 ✨","");
    return;
  }
  const connected=new Set([id]); let good=0, caut=0;
  DATA.chemistry.forEach(c=>{ if(c.a===id||c.b===id){ connected.add(c.a); connected.add(c.b);
    (c.type==="good"?good++:caut++); } });
  allEdges().forEach(e=>{ const on=e.dataset.a===id||e.dataset.b===id;
    e.classList.toggle("dim",!on); e.classList.toggle("hot",on); });
  allBadges().forEach(b=>b.classList.toggle("dim",!(b.dataset.a===id||b.dataset.b===id)));
  allNodes().forEach(n=>n.classList.toggle("dim",!connected.has(n.dataset.id)));
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  const card=document.getElementById("card-"+id);
  card.classList.add("active");
  card.scrollIntoView({behavior:"smooth", block:"center"});
  setReveal(`<span class="who">${nameById[id]}님의 인연</span> · 💚 ${good} · ⚡ ${caut}<br>인연선 뱃지를 탭하면 케미가 보여요`,"");
}

let toastTimer;
function toastMsg(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),1800);
}
// ===== 카카오 공유 (SDK → Web Share API → 클립보드 폴백) =====
// 카드 이미지/링크는 백엔드(/share/...)에서 SSR. API 미설정 시 썸네일/현재 URL로 폴백.
function shareUrls(){
  const root = location.origin + location.pathname.replace(/index\.html$/, "");
  const img  = (API && GROUP_ID) ? `${API}/share/${encodeURIComponent(GROUP_ID)}/card.png` : root + "thumbnail.html";
  const page = (API && GROUP_ID) ? `${API}/share/${encodeURIComponent(GROUP_ID)}` : location.href;
  const app  = root + (GROUP_ID ? `?group=${encodeURIComponent(GROUP_ID)}` : "");
  return { img, page, app };
}
function loadKakao(){
  return new Promise((res, rej)=>{
    if(window.Kakao) return res();
    const s=document.createElement("script");
    s.src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"; s.crossOrigin="anonymous";
    s.onload=()=>res(); s.onerror=()=>rej(new Error("kakao sdk load fail"));
    document.head.appendChild(s);
  });
}
async function ensureKakaoKey(){
  if(!KAKAO_KEY && API){
    try{ const c=await (await fetch(API+"/share/config")).json(); if(c.kakao_js_key) KAKAO_KEY=c.kakao_js_key; }
    catch(e){ /* noop */ }
  }
  return KAKAO_KEY;
}
async function kakaoShare(){
  try{
    await ensureKakaoKey();
    if(!KAKAO_KEY) throw new Error("no kakao key");
    await loadKakao();
    if(!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);
    const u=shareUrls();
    Kakao.Share.sendDefault({
      objectType:"feed",
      content:{ title:"오늘의 그룹 케미 · 케미사주",
        description:(DATA && DATA.groupComment) || "우리 그룹의 오늘 운세와 케미를 확인해보세요!",
        imageUrl:u.img, link:{ mobileWebUrl:u.page, webUrl:u.page } },
      buttons:[{ title:"운세 보러가기", link:{ mobileWebUrl:u.app, webUrl:u.app } }],
    });
    return true;
  }catch(e){ console.warn("kakao share fail:", e); return false; }
}
async function webShare(){
  if(!navigator.share) return false;
  try{ await navigator.share({ title:"케미사주", text:"우리 그룹 오늘의 케미 운세", url:shareUrls().page }); return true; }
  catch(e){ return false; }   // 사용자가 취소해도 false
}
async function copyShare(){
  try{ await navigator.clipboard.writeText(shareUrls().page); return true; }catch(e){ return false; }
}
async function share(){
  if(!GROUP_ID){ toastMsg("그룹을 먼저 만들어야 공유할 수 있어요"); return; }
  if(await webShare()){ return; }
  if(await copyShare()){ toastMsg("공유 링크를 복사했어요"); return; }
  toastMsg("공유를 사용할 수 없어요 — 링크를 직접 복사해주세요");
}

function closeSheets(){
  ["scrim","sheet","gsheet"].forEach(id=>document.getElementById(id).classList.remove("show"));
}
function openInvite(){
  closeSheets();
  const link = GROUP_ID ? `${API}/share/${encodeURIComponent(GROUP_ID)}` : "";
  document.getElementById("invlink").value = link;
  document.getElementById("scrim").classList.add("show");
  document.getElementById("sheet").classList.add("show");
}
function closeInvite(){ closeSheets(); }
function copyLink(){
  const inp=document.getElementById("invlink"); inp.select();
  if(navigator.clipboard){ navigator.clipboard.writeText(inp.value).catch(()=>{}); }
  toastMsg("초대 링크가 복사됐어요");
}

// 그룹 목록 / 전환 / 생성 (FR-02)  — 항목: {id, name}
let GROUPS=[];
function currentGroup(){ return document.getElementById("gname").textContent; }
function renderGroups(){
  const cur=currentGroup();
  document.getElementById("glist").innerHTML='<div class="glist">'+GROUPS.map(g=>
    `<div class="gitem" onclick="pickGroup(this.dataset.id, this.dataset.name)" data-id="${g.id}" data-name="${g.name}">${g.name}`+
    (g.name===cur?'<span class="mini">현재</span>':'<span class="mini">전환 ›</span>')+'</div>').join("")+'</div>';
}
async function openGroups(){
  if(LIVE && USER_ID){
    try{ const gs = await apiGet(`/users/${encodeURIComponent(USER_ID)}/groups`);
         if(gs.length) GROUPS = gs.map(g=>({id:g.id, name:g.name})); }
    catch(e){ console.warn(e); }
  }
  renderGroups(); closeSheets();
  document.getElementById("scrim").classList.add("show");
  document.getElementById("gsheet").classList.add("show");
}
function pickGroup(id, name){
  document.getElementById("gname").textContent=name; closeSheets();
  if(LIVE){ GROUP_ID=id; localStorage.setItem("chemisaju_group", id); loadGroup(); }
  else { toastMsg(name+" 운세를 불러왔어요"); }
}

// 화면 전환 (홈 ↔ 그룹 만들기)
function showHome(){ document.getElementById("create").hidden=true;
  document.getElementById("home").hidden=false; window.scrollTo(0,0); }
function goCreate(){ closeSheets(); document.getElementById("home").hidden=true;
  document.getElementById("create").hidden=false;
  document.getElementById("gn").value=""; window.scrollTo(0,0); }
async function createGroup(){
  const name=(document.getElementById("gn").value||"").trim()||"새 그룹";
  const time=document.getElementById("gt").value||"08:00";
  if(LIVE && USER_ID){
    try{
      const g = await apiPost("/groups", {name, owner_id:USER_ID, gen_time:time});
      GROUP_ID = g.group_id; localStorage.setItem("chemisaju_group", GROUP_ID);
      document.getElementById("gname").textContent=name; showHome();
      toastMsg(`'${name}' 생성! 매일 ${time}에 운세가 와요`);
      await loadGroup();          // 갓 만든 그룹은 아직 운세 미생성 → 안내 토스트
      setTimeout(openInvite,650);
    }catch(e){ console.warn(e); toastMsg("그룹 생성 실패 (API)"); }
    return;
  }
  // 오프라인(USER_ID 없음) — 임시 GROUP_ID로 초대 링크 표시
  const mockId = "g_" + Math.random().toString(36).slice(2, 9);
  GROUP_ID = mockId;
  localStorage.setItem("chemisaju_group", mockId);
  if(!GROUPS.some(x=>x.id===mockId)) GROUPS.unshift({id:mockId, name});
  document.getElementById("gname").textContent=name;
  render(SAMPLE);
  showHome();
  toastMsg(`'${name}' 생성! 매일 ${time}에 운세가 와요`);
  setTimeout(openInvite,650);
}

// ===== 초대 공유 =====
async function shareInvite(){
  const link = document.getElementById("invlink").value;
  if(navigator.share){
    try{ await navigator.share({title:"케미사주 초대", text:"사주로 우리 그룹 케미 확인해봐요!", url:link}); }
    catch(e){}
  } else {
    await navigator.clipboard.writeText(link).catch(()=>{});
    toastMsg("초대 링크가 복사됐어요");
  }
  closeInvite();
}

// ===== 부팅: GROUP_ID 있으면 API에서 데이터, 없으면 그룹 만들기 화면 =====
async function loadGroup(){
  try{
    const v = await apiGet(`/groups/${encodeURIComponent(GROUP_ID)}/view`);
    render(adapt(v));
    document.querySelector("footer").textContent = "케미사주";
  }catch(e){
    console.warn(e);
    toastMsg(String(e).includes("404") ? "아직 오늘 운세가 생성되지 않았어요" : "데이터를 불러오지 못했어요. 잠시 후 다시 시도해주세요");
    render(SAMPLE);
  }
}
async function boot(){
  if(LIVE) await loadGroup();
  else goCreate();
}
boot();
</script>
